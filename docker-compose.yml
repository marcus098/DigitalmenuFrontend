# ──────────────────────────────────────────────────────────────────────────────
# RestaurantFlow stack
#
# PRODUCTION hardening applied:
#   • App services (frontend/backend/webflux/ws) bind to 127.0.0.1 only.
#     Caddy on the host terminates TLS and reverse-proxies to localhost.
#   • Stateful services (postgres/mongo/kafka) are NOT exposed to the host.
#     They're reachable only across the Docker network via service name.
#   • Override BIND_ADDR=0.0.0.0 in .env for local dev access if needed.
#
# SECRETS: every credential is read from .env (next to this file).
# Copy .env.compose.example → .env and fill in values. NEVER commit .env.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_URL: ${FRONTEND_URL}
        REACT_APP_API_URL: ${BACKEND_URL}
        REACT_APP_BACKEND_URL_BASE: ${BACKEND_URL}
        REACT_APP_BACKEND_WEBFLUX_URL_BASE: ${WEBFLUX_URL}
        REACT_APP_BACKEND_NUMBER: "1"
        REACT_APP_WS_URL_BASE: ${WS_URL}
        REACT_APP_BUCKET_URL: ${BUCKET_URL}
        REACT_APP_IMAGE_URL_START: ${BUCKET_NAME}
        REACT_APP_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
        REACT_APP_SENTRY_DSN: ${SENTRY_DSN:-}
        REACT_APP_SENTRY_ENV: production
        REACT_APP_SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    ports:
      - "${BIND_ADDR:-127.0.0.1}:3000:80"
    depends_on:
      - backend
      - webflux
    restart: unless-stopped

  # ── Spring Boot main-app (servlet, port 8085) ─────────────────────────────
  backend:
    build:
      context: ../DigitalmenuBackend
      dockerfile: Dockerfile
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${POSTGRES_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BUCKET_S3_ENDPOINT: ${BUCKET_S3_ENDPOINT}
      BUCKET_S3_REGION: ${BUCKET_S3_REGION}
      BUCKET_S3_ACCESSKEY: ${BUCKET_S3_ACCESSKEY}
      BUCKET_S3_SECRETKEY: ${BUCKET_S3_SECRETKEY}
      CLIENT_URL: ${FRONTEND_URL}
      APP_FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  # ── Spring Boot webflux-module (reactive, port 8081) ──────────────────────
  webflux:
    build:
      context: ../DigitalmenuBackend
      dockerfile: Dockerfile.webflux
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8081:8081"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_R2DBC_USERNAME: ${POSTGRES_USER}
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${POSTGRES_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLIENT_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  # ── Rust WebSocket server (real-time dashboard updates) ───────────────────
  # Uncomment and point context to the Rust repo once it's ready.
  # ws:
  #   build:
  #     context: ../DigitalmenuWS
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${BIND_ADDR:-127.0.0.1}:8083:8083"
  #   environment:
  #     RUST_LOG: info
  #     JWT_SECRET: ${JWT_SECRET}
  #     KAFKA_BROKERS: kafka:9092
  #   depends_on:
  #     kafka:
  #       condition: service_started
  #   restart: unless-stopped

  # ── PostgreSQL (internal-only) ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB (internal-only) ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Kafka KRaft (internal-only) ─────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    expose:
      - "9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  # ── Nightly Postgres backup → S3/Backblaze B2 ───────────────────────────────
  # Runs pg_dump on cron, uploads compressed dump to B2 bucket with retention.
  # Restore: aws s3 cp s3://bucket/.../dump.sql.gz - | gunzip | psql
  postgres-backup:
    image: eeshugerman/postgres-backup-s3:16
    environment:
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
      S3_REGION: ${BACKUP_S3_REGION:-${BUCKET_S3_REGION}}
      S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESSKEY:-${BUCKET_S3_ACCESSKEY}}
      S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRETKEY:-${BUCKET_S3_SECRETKEY}}
      S3_BUCKET: ${BACKUP_S3_BUCKET}
      S3_PREFIX: ${BACKUP_S3_PREFIX:-postgres-backups}
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-${BUCKET_S3_ENDPOINT}}
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PASSPHRASE: ${BACKUP_PASSPHRASE:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
