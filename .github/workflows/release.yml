name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.2.3 or latest)"
        required: true
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Production build args — pulled from repo/environment secrets so the
          # bundle baked into the image points at the real backend.
          # Configure under Settings → Secrets and variables → Actions → Variables/Secrets.
          build-args: |
            REACT_APP_URL=${{ vars.PROD_FRONTEND_URL }}
            REACT_APP_API_URL=${{ vars.PROD_BACKEND_URL }}
            REACT_APP_BACKEND_URL_BASE=${{ vars.PROD_BACKEND_URL }}
            REACT_APP_BACKEND_WEBFLUX_URL_BASE=${{ vars.PROD_WEBFLUX_URL }}
            REACT_APP_BACKEND_NUMBER=${{ vars.PROD_BACKEND_NUMBER }}
            REACT_APP_BACKEND_PORTS=${{ vars.PROD_BACKEND_PORTS }}
            REACT_APP_WS_URL_BASE=${{ vars.PROD_WS_URL }}
            REACT_APP_BUCKET_URL=${{ vars.PROD_BUCKET_URL }}
            REACT_APP_IMAGE_URL_START=${{ vars.PROD_BUCKET_NAME }}
            REACT_APP_STRIPE_PUBLISHABLE_KEY=${{ secrets.PROD_STRIPE_PUBLISHABLE_KEY }}
            REACT_APP_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            REACT_APP_SENTRY_ENV=production
            REACT_APP_SENTRY_RELEASE=${{ github.ref_name }}

  upload-sourcemaps:
    name: Upload sourcemaps to Sentry
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.SENTRY_ORG != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Build with sourcemaps
        env:
          GENERATE_SOURCEMAP: "true"
          REACT_APP_URL: ${{ vars.PROD_FRONTEND_URL }}
          REACT_APP_API_URL: ${{ vars.PROD_BACKEND_URL }}
          REACT_APP_BACKEND_URL_BASE: ${{ vars.PROD_BACKEND_URL }}
          REACT_APP_BACKEND_WEBFLUX_URL_BASE: ${{ vars.PROD_WEBFLUX_URL }}
          REACT_APP_BACKEND_NUMBER: ${{ vars.PROD_BACKEND_NUMBER }}
          REACT_APP_BACKEND_PORTS: ${{ vars.PROD_BACKEND_PORTS }}
          REACT_APP_WS_URL_BASE: ${{ vars.PROD_WS_URL }}
          REACT_APP_BUCKET_URL: ${{ vars.PROD_BUCKET_URL }}
          REACT_APP_IMAGE_URL_START: ${{ vars.PROD_BUCKET_NAME }}
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.PROD_STRIPE_PUBLISHABLE_KEY }}
          REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          REACT_APP_SENTRY_ENV: production
          REACT_APP_SENTRY_RELEASE: ${{ github.ref_name }}
        run: npm run build

      - name: Upload to Sentry
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.ref_name }}
          sourcemaps: build/assets
          url_prefix: "~/assets"
