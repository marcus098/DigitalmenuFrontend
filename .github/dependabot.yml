version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ["@types/*"]
      radix:
        patterns: ["@radix-ui/*"]
      testing:
        patterns: ["@testing-library/*", "@playwright/*"]
    ignore:
      # CRA pin — major upgrades require migration to Vite first
      - dependency-name: "react-scripts"
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
