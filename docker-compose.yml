# ── Ports exposed to host ──────────────────────────────────────────────────────
# frontend  → http://localhost:3000
# backend   → http://localhost:8085
# webflux   → http://localhost:8081
# ws        → ws://localhost:8083  (Rust WebSocket server)
# postgres  → localhost:5432
# mongodb   → localhost:27017
# kafka     → localhost:9092  (advertised as kafka:9092, only for Docker-internal use)
# storage   → Backblaze B2 (external S3-compatible service)
# ──────────────────────────────────────────────────────────────────────────────
# SECRETS: every credential is read from .env at the root of this repo.
# Copy .env.compose.example → .env and fill in values. NEVER commit .env.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_URL: ${FRONTEND_URL}
        REACT_APP_API_URL: ${BACKEND_URL}
        REACT_APP_BACKEND_URL_BASE: ${BACKEND_URL}
        REACT_APP_BACKEND_WEBFLUX_URL_BASE: ${WEBFLUX_URL}
        REACT_APP_BACKEND_NUMBER: "1"
        REACT_APP_WS_URL_BASE: ${WS_URL}
        REACT_APP_BUCKET_URL: ${BUCKET_URL}
        REACT_APP_IMAGE_URL_START: ${BUCKET_NAME}
        REACT_APP_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:80"
    depends_on:
      - backend
      - webflux
    restart: unless-stopped

  # ── Spring Boot main-app (servlet, port 8085) ─────────────────────────────
  backend:
    build:
      context: ../DigitalmenuBackend
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${POSTGRES_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BUCKET_S3_ENDPOINT: ${BUCKET_S3_ENDPOINT}
      BUCKET_S3_REGION: ${BUCKET_S3_REGION}
      BUCKET_S3_ACCESSKEY: ${BUCKET_S3_ACCESSKEY}
      BUCKET_S3_SECRETKEY: ${BUCKET_S3_SECRETKEY}
      CLIENT_URL: ${FRONTEND_URL}
      APP_FRONTEND_URL: ${FRONTEND_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  # ── Spring Boot webflux-module (reactive, port 8081) ──────────────────────
  webflux:
    build:
      context: ../DigitalmenuBackend
      dockerfile: Dockerfile.webflux
    ports:
      - "8081:8081"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_R2DBC_USERNAME: ${POSTGRES_USER}
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${POSTGRES_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CLIENT_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  # ── Rust WebSocket server (real-time dashboard updates) ───────────────────
  # Uncomment and point context to the Rust repo once it's ready.
  # ws:
  #   build:
  #     context: ../DigitalmenuWS
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     RUST_LOG: info
  #     JWT_SECRET: ${JWT_SECRET}
  #     KAFKA_BROKERS: kafka:9092
  #   depends_on:
  #     kafka:
  #       condition: service_started
  #   restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Kafka (KRaft mode, no Zookeeper) ────────────────────────────────────────
  # Advertised as kafka:9092 — reachable only from inside Docker.
  # To connect from the host you need a second EXTERNAL listener on a different port.
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
